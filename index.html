<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KaironKit | K-MemoKit</title>
  <meta
    name="description"
    content="KaironKit의 메인 프로그램 K-MemoKit을 소개하는 홈페이지"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-deco bg-deco-1"></div>
  <div class="bg-deco bg-deco-2"></div>
  <div class="bg-deco bg-deco-3"></div>

  <header class="topbar" aria-hidden="true"></header>

  <main class="page-shell">
    <section class="page-section home-section" id="home">
      <div class="section-inner home-layout">
        <div class="hero-left">
          <h1 class="hero-title">
            <span class="title-small">KaironKit의 대표 프로그램</span>
            <strong id="appTitle">K-MemoKit</strong>
          </h1>

          <div class="hero-space" aria-hidden="true"></div>

          <p class="hero-desc" id="appDesc">
            메모, 일정, 즐겨찾기, 계산기를 한곳에 모아
            쉽고 빠르게 사용할 수 있는 데스크톱 프로그램입니다.
            딱딱한 도구가 아니라, 매일 편하게 꺼내 쓰는
            나만의 작은 작업 키트를 목표로 만들었습니다.
          </p>

          <div class="hero-actions hero-actions-large">
            <button class="cute-btn primary big-action" id="installBtn" type="button">
              무료설치
            </button>

            <button class="cute-btn like-action big-action impact-button" id="likeButton" type="button">
              <span class="like-button-heart">♥</span>
              <span class="like-button-text" id="likeButtonText">좋아요</span>
            </button>
          </div>
        </div>

        <div class="hero-right">
          <div class="hero-image-wrap">
            <div class="hero-image-glow hero-image-glow-1" aria-hidden="true"></div>
            <div class="hero-image-glow hero-image-glow-2" aria-hidden="true"></div>

            <div class="image-panel-tabs" aria-label="슬라이드 탭">
              <button type="button" class="image-panel-tab active">K-MemoKit</button>
            </div>

            <div class="image-carousel" id="imageCarousel">
              <button class="image-arrow image-arrow-left" id="imagePrevBtn" aria-label="이전 이미지" type="button">
                <span>‹</span>
              </button>

              <div
                class="image-viewport"
                id="imageViewport"
                role="button"
                tabindex="0"
                aria-label="이미지 슬라이드. 클릭하면 재생 또는 일시정지됩니다."
              >
                <div class="image-frame-box">
                  <div class="image-frame-inner">
                    <div class="image-shine" aria-hidden="true"></div>

                    <div class="slide-toggle-impact" id="slideToggleImpact" aria-hidden="true"></div>

                    <div class="image-track" id="imageTrack">
                      <div class="image-slide image-slide-full">
                        <img src="img1.png" alt="K-MemoKit 구성 이미지 1" class="hero-image" />
                      </div>
                      <div class="image-slide">
                        <img src="img2.png" alt="K-MemoKit 구성 이미지 2" class="hero-image" />
                      </div>
                      <div class="image-slide">
                        <img src="img3.png" alt="K-MemoKit 구성 이미지 3" class="hero-image" />
                      </div>
                      <div class="image-slide">
                        <img src="img4.png" alt="K-MemoKit 구성 이미지 4" class="hero-image" />
                      </div>
                      <div class="image-slide">
                        <img src="img5.png" alt="K-MemoKit 구성 이미지 5" class="hero-image" />
                      </div>
                      <div class="image-slide">
                        <img src="img6.png" alt="K-MemoKit 구성 이미지 6" class="hero-image" />
                      </div>
                    </div>

                    <div class="image-caption is-hidden" id="imageCaption" aria-hidden="true">
                      <strong></strong>
                      <span></span>
                    </div>
                  </div>
                </div>
              </div>

              <button class="image-arrow image-arrow-right" id="imageNextBtn" aria-label="다음 이미지" type="button">
                <span>›</span>
              </button>
            </div>

            <div class="image-dots" id="imageDots">
              <button class="image-dot active" type="button" data-image-index="0" aria-label="이미지 1"></button>
              <button class="image-dot" type="button" data-image-index="1" aria-label="이미지 2"></button>
              <button class="image-dot" type="button" data-image-index="2" aria-label="이미지 3"></button>
              <button class="image-dot" type="button" data-image-index="3" aria-label="이미지 4"></button>
              <button class="image-dot" type="button" data-image-index="4" aria-label="이미지 5"></button>
              <button class="image-dot" type="button" data-image-index="5" aria-label="이미지 6"></button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="footer-inline">
        <strong>KaironKit</strong>
        <span class="footer-divider">|</span>
        <a href="mailto:kaironkit@gmail.com">문의</a>
        <span class="footer-divider">|</span>
        <a
          href="https://blog.naver.com/iron_writer"
          target="_blank"
          rel="noopener noreferrer"
        >
          블로그
        </a>
      </div>
    </div>
  </footer>

  <div class="like-burst-layer" id="likeBurstLayer" aria-hidden="true"></div>

  <script src="main.js"></script>
</body>
</html>
